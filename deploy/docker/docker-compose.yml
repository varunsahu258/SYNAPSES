version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    environment:
      SYNAPSES_DATABASE_URL: ${SYNAPSES_DATABASE_URL:-postgresql+psycopg://synapses:synapses@db:5432/synapses}
      SYNAPSES_LOG_LEVEL: ${SYNAPSES_LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    command: ["python", "-m", "synapses.workflow"]
    environment:
      SYNAPSES_DATABASE_URL: ${SYNAPSES_DATABASE_URL:-postgresql+psycopg://synapses:synapses@db:5432/synapses}
      SYNAPSES_LOG_LEVEL: ${SYNAPSES_LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synapses
      POSTGRES_USER: synapses
      POSTGRES_PASSWORD: synapses
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapses -d synapses"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
