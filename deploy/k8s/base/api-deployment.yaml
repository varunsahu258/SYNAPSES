apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapses-api
  namespace: synapses
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: synapses-api
  template:
    metadata:
      labels:
        app: synapses-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/synapses-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: synapses-config
            - secretRef:
                name: synapses-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
